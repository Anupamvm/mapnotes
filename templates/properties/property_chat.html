{% extends 'base.html' %}
{% block title %}Quick Add — MapNotes{% endblock %}

{% block content %}
<style>
/* ── Page shell ──────────────────────────────────────────────────────────── */
#chat-page {
  position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; background: var(--bs-body-bg);
}
#prog { height: 3px; background: var(--bs-border-color); flex-shrink: 0; }
#prog-fill { height: 100%; background: #198754; width: 0; transition: width .4s; }

/* ── Thread ──────────────────────────────────────────────────────────────── */
#thread {
  flex: 1; overflow-y: auto;
  padding: 1.25rem 1rem 0.5rem;
  display: flex; flex-direction: column; gap: 1rem;
}
.mrow { display: flex; gap: .6rem; align-items: flex-start; max-width: 760px; width: 100%; margin: 0 auto; }
.mrow.urow { flex-direction: row-reverse; }
.av { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 700; margin-top: 3px; }
.av-bot { background: #198754; color: #fff; }
.av-usr { background: #0d6efd; color: #fff; }
.bbl { padding: .55rem .8rem; border-radius: .9rem; font-size: .93rem; line-height: 1.55;
  max-width: calc(100% - 40px); word-break: break-word; }
.bbl-bot { background: var(--bs-secondary-bg); color: var(--bs-body-color); border-bottom-left-radius: .2rem; }
.bbl-usr { background: #0d6efd; color: #fff; border-bottom-right-radius: .2rem; }
.dots span { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  background: var(--bs-secondary-color); margin: 0 2px; animation: blink 1.2s infinite; }
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.75)}40%{opacity:1;transform:scale(1)}}
.file-thumb { max-width: 160px; max-height: 120px; border-radius: .4rem; display: block; margin-bottom: 4px; }
.file-meta { font-size: .8rem; opacity: .85; }
.rm-file { font-size: .72rem; background: rgba(255,255,255,.22); border: none;
  border-radius: .3rem; padding: 1px 5px; color: #fff; cursor: pointer; margin-top: 2px; }

/* ── Suggestions ─────────────────────────────────────────────────────────── */
#sugs-wrap { max-width: 760px; margin: 0 auto; width: 100%; padding: .4rem 1rem 0; }
#sugs { display: flex; flex-wrap: wrap; gap: .35rem; }
.sc { padding: .32rem .8rem; border-radius: 2rem; font-size: .86rem;
  border: 1.5px solid #198754; color: #198754; background: transparent;
  cursor: pointer; transition: background .12s, color .12s; white-space: nowrap; }
.sc:hover, .sc.hit { background: #198754; color: #fff; }
[data-bs-theme=dark] .sc { color: #2dce89; border-color: #2dce89; }
[data-bs-theme=dark] .sc:hover, [data-bs-theme=dark] .sc.hit { background: #2dce89; color: #000; }
.sc.ms { border-color: #0d6efd; color: #0d6efd; }
.sc.ms.hit { background: #0d6efd; color: #fff; }

/* GPS */
#gps-wrap { max-width: 760px; margin: 0 auto; width: 100%; padding: .4rem 1rem 0; display: none; }
#gps-btn { width: 100%; padding: .55rem 1rem; border-radius: .7rem; font-size: .95rem; font-weight: 600; }

/* ── Input bar ───────────────────────────────────────────────────────────── */
#bar-wrap { max-width: 760px; margin: .35rem auto 0; width: 100%;
  padding: 0 1rem; padding-bottom: max(env(safe-area-inset-bottom,0px),.75rem); flex-shrink: 0; }
#bar { display: flex; align-items: flex-end; gap: .35rem;
  background: var(--bs-secondary-bg); border: 1.5px solid var(--bs-border-color);
  border-radius: .9rem; padding: .4rem .4rem .4rem .85rem; transition: border-color .2s; }
#bar:focus-within { border-color: #198754; }
#msg { flex: 1; border: none; background: transparent; resize: none; outline: none;
  font-size: 1rem; line-height: 1.5; color: var(--bs-body-color);
  max-height: 140px; overflow-y: auto; min-height: 1.5rem; padding: 0; }
#msg::placeholder { color: var(--bs-secondary-color); }
.bar-btn { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-size: .87rem; transition: background .15s; }
#attach-btn { background: transparent; color: var(--bs-secondary-color); }
#attach-btn:hover { color: #198754; }
#send-btn { background: #198754; color: #fff; }
#send-btn:disabled { background: var(--bs-border-color); cursor: default; opacity: .6; }
#send-btn:not(:disabled):hover { background: #157347; }
#hint { font-size: .74rem; color: var(--bs-secondary-color); text-align: center; margin-top: .25rem; min-height: .9rem; }

/* ── Summary card ────────────────────────────────────────────────────────── */
.sum-outer { border: 1.5px solid var(--bs-border-color); border-radius: .8rem; overflow: hidden; margin-top: .5rem; }
.sum-tabs { display: flex; overflow-x: auto; background: var(--bs-secondary-bg);
  border-bottom: 1.5px solid var(--bs-border-color); gap: 0; scrollbar-width: none; }
.sum-tabs::-webkit-scrollbar { display: none; }
.stab { padding: .45rem .75rem; font-size: .8rem; white-space: nowrap; cursor: pointer;
  background: transparent; border: none; color: var(--bs-secondary-color);
  border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; transition: color .15s, border-color .15s; }
.stab.on { color: #198754; border-bottom-color: #198754; font-weight: 600; }
.sum-panel { display: none; padding: .75rem; background: var(--bs-body-bg); }
.sum-panel.on { display: block; }
.sr { display: flex; gap: .45rem; margin-bottom: .4rem; align-items: flex-start; }
.sl { color: var(--bs-secondary-color); min-width: 80px; flex-shrink: 0; font-size: .76rem; padding-top: 2px; }
.sv { font-weight: 500; font-size: .87rem; }
.ic { padding: .2rem .6rem; border-radius: 1.5rem; font-size: .78rem;
  border: 1.5px solid var(--bs-border-color); background: transparent;
  cursor: pointer; color: var(--bs-body-color); margin: 2px;
  transition: background .12s, color .12s, border-color .12s; }
.ic.on { background: #198754; color: #fff; border-color: #198754; }
.ic.ms.on { background: #0d6efd; border-color: #0d6efd; }
.star-row { display: flex; align-items: center; gap: .25rem; }
.star { font-size: 1.1rem; cursor: pointer; color: var(--bs-border-color); line-height: 1; transition: color .1s; }
.star.on { color: #ffc107; }

/* create button */
.create-btn { width: 100%; padding: .65rem; border-radius: .7rem;
  font-size: .97rem; font-weight: 700; margin-top: .7rem;
  background: #198754; color: #fff; border: none; cursor: pointer; }
.create-btn:hover:not(:disabled) { background: #157347; }
.create-btn:disabled { opacity: .65; cursor: default; }
.change-lnk { font-size: .77rem; color: #6c757d; cursor: pointer; text-decoration: underline; }

/* note textarea */
.quick-ta { font-size: 14px; border-radius: .5rem; resize: none; width: 100%; }
</style>

{{ projects|json_script:"pd" }}

<div id="chat-page">
  <div id="prog"><div id="prog-fill"></div></div>
  <div id="thread"></div>

  <div id="gps-wrap">
    <button id="gps-btn" class="btn btn-success">
      <i class="bi bi-geo-alt-fill me-2"></i>Use My Current Location
    </button>
  </div>

  <div id="sugs-wrap"><div id="sugs"></div></div>

  <div id="bar-wrap">
    <div id="bar">
      <label id="attach-btn" class="bar-btn mb-0" style="cursor:pointer;" title="Attach file">
        <i class="bi bi-paperclip"></i>
        <input id="file-inp" type="file" multiple
               accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.csv"
               style="display:none;">
      </label>
      <textarea id="msg" rows="1" placeholder="Message…" style="font-size:16px;"></textarea>
      <button id="send-btn" class="bar-btn" disabled>
        <i class="bi bi-arrow-up"></i>
      </button>
    </div>
    <div id="hint"></div>
  </div>
</div>

<script>
(function () {
/* ── Config ── */
const CSRF       = '{{ csrf_token }}';
const CREATE_URL = '{% url "properties:quick-create" %}';
const UPLOAD_BASE = '/properties/';

/* ── Data ── */
const projects        = JSON.parse(document.getElementById('pd').textContent);
const activeProjectId = {{ active_project_id|default:"null" }};

/* ── State ── */
const A  = { land_type: 'agricultural', priority: 'medium', status: 'to_visit', distances: {} };
const fileQueue = [];
const TOTAL = 11;  // steps for progress bar

/* ── Unit conversion ── */
const CONV = { acres: 1, guntha: 1/40, hectare: 2.47105, sqft: 1/43560, sqmeter: 1/4047 };
function toAcres(n, unit) { return n * (CONV[unit] || 1); }
function toSqft(acres) { return acres * 43560; }
function toPricePerAcre(totalPrice, area, unit) {
  const ac = toAcres(area, unit); return ac > 0 ? totalPrice / ac : null;
}
function toPricePerSqft(pricePerAcre) { return pricePerAcre ? pricePerAcre / 43560 : null; }
function toPricePerGuntha(pricePerAcre) { return pricePerAcre ? pricePerAcre / 40 : null; }

/* ── Parsers ── */
function parseGMaps(t) {
  let m = t.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) || t.match(/[?&]q=(-?\d+\.\d+)[,+](-?\d+\.\d+)/)
         || t.match(/[?&]ll=(-?\d+\.\d+),(-?\d+\.\d+)/) || t.match(/(-?\d{1,3}\.\d{4,}),(-?\d{1,3}\.\d{4,})/);
  return m ? { lat: +m[1], lng: +m[2] } : null;
}
function isShortMapsUrl(t) {
  return /goo\.gl\/maps|maps\.app\.goo\.gl/.test(t);
}
async function resolveShortUrl(url) {
  try {
    const r = await fetch('{% url "properties:resolve-map-url" %}', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      body: JSON.stringify({ url }),
    });
    return await r.json();
  } catch { return null; }
}
function parseMoney(t) {
  const s = t.toLowerCase().replace(/[\s,₹]/g,'');
  const n = parseFloat(s); if (!n) return null;
  if (s.includes('cr')) return Math.round(n*1e7);
  if (s.includes('l') || s.includes('lakh')) return Math.round(n*1e5);
  if (s.includes('k')) return Math.round(n*1e3);
  return n;
}
function parseRate(t) {
  // Returns { amount, unit } where unit is 'sqft','acre','guntha','hectare'
  const s = t.toLowerCase().replace(/[\s₹,]/g,'');
  let amount = null;
  const n = parseFloat(s); if (!n) return null;
  if (s.includes('cr')) amount = n*1e7;
  else if (s.includes('l') || s.includes('lakh')) amount = n*1e5;
  else if (s.includes('k')) amount = n*1e3;
  else amount = n;
  let unit = 'sqft';
  if (s.includes('acre')) unit = 'acre';
  else if (s.includes('guntha') || s.includes('gunta')) unit = 'guntha';
  else if (s.includes('hectare')) unit = 'hectare';
  else if (s.includes('sqft') || s.includes('sqf') || s.includes('/sq') || s.includes('sft')) unit = 'sqft';
  return { amount, unit };
}
function rateToComponents(amount, unit) {
  let ppa, pps;
  if (unit === 'acre') { ppa = amount; pps = amount/43560; }
  else if (unit === 'guntha') { ppa = amount*40; pps = ppa/43560; }
  else if (unit === 'hectare') { ppa = amount/2.47105; pps = ppa/43560; }
  else { pps = amount; ppa = amount*43560; }  // sqft
  return { price_per_acre: Math.round(ppa), price_per_sqft: Math.round(pps * 100) / 100 };
}
function fmtPrice(n) {
  if (!n) return ''; n=+n;
  if (n>=1e7) return '₹'+(n/1e7).toFixed(2).replace(/\.?0+$/,'')+'Cr';
  if (n>=1e5) return '₹'+(n/1e5).toFixed(1).replace(/\.0$/,'')+'L';
  return '₹'+Math.round(n).toLocaleString('en-IN');
}
function fmtBytes(b) { if(b<1048576)return(b/1024).toFixed(1)+'KB'; return(b/1048576).toFixed(1)+'MB'; }
function classifyFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (file.type.startsWith('image/') || ['jpg','jpeg','png','gif','heic','webp'].includes(ext)) return 'photo';
  if (file.type.startsWith('video/') || ['mp4','mov','avi','mkv','3gp'].includes(ext)) return 'video';
  if (ext==='pdf') return 'pdf';
  return 'document';
}

/* ── DOM refs ── */
const thread  = document.getElementById('thread');
const sugs    = document.getElementById('sugs');
const gpsWrap = document.getElementById('gps-wrap');
const gpsBtn  = document.getElementById('gps-btn');
const msg     = document.getElementById('msg');
const sendBtn = document.getElementById('send-btn');
const hint    = document.getElementById('hint');
const pfill   = document.getElementById('prog-fill');

/* ── Helpers ── */
const setProgress = n => pfill.style.width = Math.round(n/TOTAL*100)+'%';
const scrollEnd   = () => thread.scrollTop = thread.scrollHeight;
const clearSugs   = () => { sugs.innerHTML=''; gpsWrap.style.display='none'; };
const setHint     = t  => hint.textContent = t||'';

/* ── Messaging ── */
function typing() {
  const r=document.createElement('div'); r.className='mrow';
  r.innerHTML=`<div class="av av-bot">M</div><div class="bbl bbl-bot"><div class="dots"><span></span><span></span><span></span></div></div>`;
  thread.appendChild(r); scrollEnd(); return r;
}
function botSay(html, delay=420) {
  return new Promise(ok => {
    const r=typing();
    setTimeout(()=>{ r.querySelector('.bbl').innerHTML=html; scrollEnd(); ok(r); }, delay);
  });
}
function userSay(text) {
  const r=document.createElement('div'); r.className='mrow urow';
  r.innerHTML=`<div class="av av-usr">U</div><div class="bbl bbl-usr">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`;
  thread.appendChild(r); scrollEnd();
}

/* ── File handling ── */
document.getElementById('file-inp').addEventListener('change', e => {
  Array.from(e.target.files).forEach(file => {
    const type=classifyFile(file), id=Date.now()+Math.random();
    const objUrl=file.type.startsWith('image/')?URL.createObjectURL(file):null;
    fileQueue.push({file,type,id,objUrl}); showFile({file,type,id,objUrl});
  }); e.target.value='';
});
function showFile({file,type,id,objUrl}) {
  const icon={photo:'📷',video:'🎬',pdf:'📄',document:'📁',survey_map:'🗺️'}[type]||'📁';
  const r=document.createElement('div'); r.className='mrow urow'; r.dataset.fid=id;
  r.innerHTML=`<div class="av av-usr">U</div>
    <div class="bbl bbl-usr" style="padding:.45rem .7rem;">
      ${objUrl?`<img src="${objUrl}" class="file-thumb" alt="${file.name}">`:''}
      <div class="file-meta">${icon} <strong>${type}</strong> · ${file.name}</div>
      <div class="file-meta">${fmtBytes(file.size)} — attaches after creation</div>
      <button class="rm-file" data-id="${id}">✕ Remove</button>
    </div>`;
  r.querySelector('.rm-file').addEventListener('click',function(){
    const fid=+this.dataset.id, idx=fileQueue.findIndex(f=>f.id===fid);
    if(idx>-1){if(fileQueue[idx].objUrl)URL.revokeObjectURL(fileQueue[idx].objUrl);fileQueue.splice(idx,1);}
    r.remove();
  });
  thread.appendChild(r); scrollEnd();
}

/* ── Input ── */
let onSend=null;
function enableInput(placeholder,handler,hintText='') {
  msg.value=''; msg.placeholder=placeholder; msg.style.height='auto';
  onSend=handler; sendBtn.disabled=true; setHint(hintText);
  setTimeout(()=>msg.focus(),80);
}
function disableInput(){onSend=null; sendBtn.disabled=true;}
msg.addEventListener('input',()=>{ msg.style.height='auto'; msg.style.height=msg.scrollHeight+'px'; sendBtn.disabled=!msg.value.trim(); });
msg.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault(); if(!sendBtn.disabled&&onSend)fire();} });
sendBtn.addEventListener('click',()=>{ if(!sendBtn.disabled&&onSend)fire(); });
function fire(){const v=msg.value.trim();if(!v)return; msg.value=''; msg.style.height='auto'; sendBtn.disabled=true; onSend(v);}

/* ── Chips ── */
function showChips(items, onPick, opts={}) {
  sugs.innerHTML='';
  items.forEach(item=>{
    const b=document.createElement('button');
    b.className='sc'+(item.multi?' ms':'');
    b.textContent=item.label;
    b.addEventListener('click',()=>{
      if(!opts.multi){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('hit'));}
      b.classList.toggle('hit');
      if(!opts.multi) setTimeout(()=>onPick(item),120);
    });
    sugs.appendChild(b);
  });
  if(opts.multi){
    const ok=document.createElement('button');
    ok.className='sc'; ok.textContent='Done ✓';
    ok.style.cssText='border-color:#0d6efd;color:#0d6efd;';
    ok.addEventListener('click',()=>{
      const sel=Array.from(sugs.querySelectorAll('.sc.hit:not(:last-child)'));
      onPick(sel.map(b=>items.find(x=>x.label===b.textContent)));
    });
    sugs.appendChild(ok);
  }
  scrollEnd();
}

/* ── Project ── */
function resolveProject() {
  if(activeProjectId) return projects.find(p=>p.id===activeProjectId)||null;
  return projects.find(p=>p.is_default)||projects[0]||null;
}

/* ═══ STEPS ═══════════════════════════════════════════════════════════════ */

async function start() {
  setProgress(0); disableInput(); clearSugs();
  const preset=resolveProject();
  if(preset){
    A.project_id=preset.id; A.project_name=preset.name;
    const r=await botSay(`Hi! I'll add this to <strong>${preset.name}</strong> ✓<br><span class="change-lnk" id="chg">Change map →</span>`);
    r.querySelector('#chg').addEventListener('click',()=>{r.remove();stepMap();});
    setTimeout(stepName,280);
  } else stepMap();
}

/* 0 — Map */
async function stepMap() {
  setProgress(0); disableInput(); clearSugs();
  await botSay('Which map are you adding this property to?');
  if(!projects.length){await botSay('No active maps found. <a href="/">Create one first →</a>');return;}
  showChips(projects.map(p=>({label:(p.is_default?'⭐ ':'')+p.name,id:p.id,name:p.name})),
    item=>{A.project_id=item.id;A.project_name=item.name;userSay(item.name);clearSugs();stepName();});
}

/* 1 — Name */
async function stepName() {
  setProgress(1); clearSugs();
  await botSay('What do you call this property?<br><small class="text-muted">Nickname, survey number or area name</small>');
  enableInput('e.g. Pawna Hills Plot, S.No.45…',v=>{A.name=v;userSay(v);disableInput();stepLocation();});
}

/* 2 — Location */
async function stepLocation() {
  setProgress(2);
  await botSay('Where is it?<br><small class="text-muted">Tap GPS, paste a Google Maps link, or type the village name</small>');
  gpsWrap.style.display='block';
  showChips([{label:'Skip →'}],()=>{userSay('Location skipped');clearSugs();disableInput();stepArea();});
  enableInput('Paste Maps link, village, or address…', async v => {
    const c=parseGMaps(v);
    if(c){
      A.latitude=c.lat; A.longitude=c.lng;
      userSay('📍 '+c.lat.toFixed(5)+', '+c.lng.toFixed(5));
      clearSugs(); disableInput(); stepArea();
    } else if(isShortMapsUrl(v)) {
      // Short link (goo.gl, maps.app.goo.gl) — resolve server-side
      userSay(v); clearSugs(); disableInput();
      const dot=typing();
      const res=await resolveShortUrl(v);
      dot.remove();
      if(res && res.lat){
        A.latitude=res.lat; A.longitude=res.lng;
        await botSay(`Found location from your link:<br>📍 ${res.lat.toFixed(5)}, ${res.lng.toFixed(5)}`);
        showChips([{label:'✓ Use this'},{label:'↺ Try different link'},{label:'Skip →'}], item=>{
          clearSugs();
          if(item.label==='↺ Try different link'){ delete A.latitude; delete A.longitude; stepLocation(); }
          else if(item.label==='Skip →'){ delete A.latitude; delete A.longitude; stepArea(); }
          else stepArea();
        });
      } else {
        await botSay('Couldn\'t extract coordinates from that short link.<br><small class="text-muted">In Google Maps: tap <strong>Share → Copy link</strong> to get the full URL, or use GPS above.</small>',200);
        A.full_address=v; stepArea();
      }
    } else {
      userSay(v); clearSugs(); disableInput();
      if(window.geocoder){
        const dot=typing();
        const found=await geocodeText(v).catch(()=>null);
        dot.remove();
        if(found){
          A.latitude=found.lat; A.longitude=found.lng; A.full_address=found.formattedAddress;
          await botSay(`Found on Google Maps:<br><strong>${found.formattedAddress}</strong><br><small class="text-muted">📍 ${found.lat.toFixed(5)}, ${found.lng.toFixed(5)}</small>`);
          showChips([{label:'✓ That\'s it'},{label:'↺ Try again'},{label:'Skip →'}], item=>{
            clearSugs();
            if(item.label==='↺ Try again'){
              delete A.latitude; delete A.longitude; delete A.full_address;
              stepLocation();
            } else if(item.label==='Skip →'){
              delete A.latitude; delete A.longitude; delete A.full_address;
              stepArea();
            } else {
              stepArea();
            }
          });
        } else {
          await botSay('Couldn\'t find that on Google Maps — saved as text. You can pin the exact location from the property page.',200);
          A.full_address=v; stepArea();
        }
      } else {
        A.full_address=v; stepArea();
      }
    }
  },'Tap GPS above · paste a Maps link · or type village name');
}
gpsBtn.addEventListener('click',function(){
  gpsBtn.disabled=true; gpsBtn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Getting…';
  navigator.geolocation.getCurrentPosition(
    pos=>{A.latitude=pos.coords.latitude;A.longitude=pos.coords.longitude;
      userSay('📍 '+A.latitude.toFixed(5)+', '+A.longitude.toFixed(5));
      clearSugs();disableInput();stepArea();},
    ()=>{gpsBtn.disabled=false;gpsBtn.innerHTML='<i class="bi bi-geo-alt-fill me-2"></i>Use My Current Location';
      botSay('Could not get location — type it instead.',200);},
    {timeout:8000}
  );
});

/* 3 — Area */
let selUnit='acres';
const AREA_CHIPS=[
  {label:'½ Acre',a:.5,u:'acres'},{label:'1 Acre',a:1,u:'acres'},{label:'2 Acres',a:2,u:'acres'},
  {label:'5 Acres',a:5,u:'acres'},{label:'10 Acres',a:10,u:'acres'},{label:'20 Acres',a:20,u:'acres'},

let selRateUnit = 'acre';
async function stepQuoteRate() {

  let autoChips = [];
  if (A.asking_price && A.total_area) {
    const ppa = toPricePerAcre(A.asking_price, A.total_area, A.area_unit);

      const ppg = toPricePerGuntha(ppa);
      autoChips = [
        { label: fmtPrice(Math.round(ppa))+'/acre',   ppa: Math.round(ppa), pps: Math.round(pps*100)/100 },
        { label: fmtPrice(Math.round(ppg))+'/guntha',  ppa: Math.round(ppa), pps: Math.round(pps*100)/100 },
        { label: fmtPrice(Math.round(pps))+'/sqft',    ppa: Math.round(ppa), pps: Math.round(pps*100)/100 },
      ];
    }
  }

  await botSay('What\'s the quoting rate?<br><small class="text-muted">Type the amount, then tap the unit — or tap a suggested rate below</small>');

  sugs.innerHTML = '';

  // Row 1: auto-suggested complete rates (if available)
  if (autoChips.length) {
    const sugRow = document.createElement('div');
    sugRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.4rem;padding-bottom:.4rem;border-bottom:1px solid var(--bs-border-color);';

      b.addEventListener('click', () => {
        A.price_per_acre = item.ppa; A.price_per_sqft = item.pps;
        userSay(item.label); clearSugs(); disableInput(); stepContact();
      });
      sugRow.appendChild(b);
    });
    sugs.appendChild(sugRow);
  }

  // Row 2: unit picker — tap to select, then type the number
  const RATE_UNITS = [
    { label: '/acre', u: 'acre' }, { label: '/guntha', u: 'guntha' },
    { label: '/sqft', u: 'sqft' }, { label: '/hectare', u: 'hectare' },
  ];
  const unitRow = document.createElement('div');
  unitRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.3rem;';
  RATE_UNITS.forEach(item => {
    const b = document.createElement('button');
    b.className = 'sc' + (item.u === 'acre' ? ' hit' : '');
    b.style.cssText = 'border-color:#0d6efd;color:#0d6efd;font-weight:600;';
    b.classList.toggle('hit', item.u === 'acre');
    if (item.u === 'acre') { b.style.background = '#0d6efd'; b.style.color = '#fff'; }
    b.textContent = item.label;
    b.addEventListener('click', () => {
      unitRow.querySelectorAll('.sc').forEach(s => {
        s.classList.remove('hit'); s.style.background = ''; s.style.color = '#0d6efd';
      });
      b.classList.add('hit'); b.style.background = '#0d6efd'; b.style.color = '#fff';
      selRateUnit = item.u;
      msg.focus();
    });
    unitRow.appendChild(b);
  });
  const skipB = document.createElement('button');
  skipB.className = 'sc'; skipB.textContent = 'Skip →';
  skipB.addEventListener('click', () => { userSay('Rate skipped'); clearSugs(); disableInput(); stepContact(); });
  unitRow.appendChild(skipB);

  scrollEnd();

function icGroup(obj, activeKey, onChange) {
  return Object.entries(obj).map(([k,v])=>
    `<button class="ic${activeKey===k?' on':''}" data-k="${k}">${v}</button>`
  ).join('');
}
function attachIcGroup(parent, cls, onChange) {
  parent.querySelectorAll(cls).forEach(b=>b.addEventListener('click',()=>{
    parent.querySelectorAll(cls).forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); onChange(b.dataset.k);
  }));
}
function starWidget(fieldKey, currentVal, label) {

}

  // Terrain
  row.querySelectorAll('.terr-ic').forEach(b=>b.addEventListener('click',()=>{
    row.querySelectorAll('.terr-ic').forEach(x=>x.classList.remove('on'));b.classList.add('on');A.terrain_type=b.dataset.v;
  }));
  // Water (multi)
  row.querySelectorAll('.water-ic').forEach(b=>b.addEventListener('click',()=>{
    b.classList.toggle('on'); A[b.dataset.v]=b.classList.contains('on');
  }));
  // Electricity
  row.querySelectorAll('.elec-ic').forEach(b=>b.addEventListener('click',()=>{
    row.querySelectorAll('.elec-ic').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    A.electricity_available=b.dataset.v==='null'?null:b.dataset.v==='1';
  }));
  // Legal
  row.querySelectorAll('.legal-ic').forEach(b=>b.addEventListener('click',()=>{
    row.querySelectorAll(`.legal-ic[data-f="${b.dataset.f}"]`).forEach(x=>x.classList.remove('on'));
    b.classList.add('on');A[b.dataset.f]=b.dataset.v==='null'?null:b.dataset.v==='true';
  }));
  // Stars
  row.querySelectorAll('.star').forEach(s=>s.addEventListener('click',()=>{
    const f=s.dataset.f,n=+s.dataset.n; A[f]=n;
    row.querySelectorAll(`#s_${f} .star`).forEach((x,i)=>{x.classList.toggle('on',i<n);});
  }));

  // Create button
  row.querySelector('#cbtn').addEventListener('click',()=>{
    const n=row.querySelector('#qnote');
    if(n&&n.value.trim())A.quick_note=n.value.trim();
    doCreate(row.querySelector('#cbtn'), row);
  });

  showChips([{label:'← Start over'}],()=>{
    thread.innerHTML=''; fileQueue.forEach(f=>{if(f.objUrl)URL.revokeObjectURL(f.objUrl);}); fileQueue.length=0;
    const keys=Object.keys(A); keys.forEach(k=>delete A[k]);
    A.land_type='agricultural'; A.priority='medium'; A.status='to_visit'; A.distances={};
    clearSugs(); start();
  });
}

window.handleSumFileAdd=function(input){
  Array.from(input.files).forEach(file=>{
    const type=classifyFile(file),id=Date.now()+Math.random();
    const objUrl=file.type.startsWith('image/')?URL.createObjectURL(file):null;
    fileQueue.push({file,type,id,objUrl});
    const list=document.getElementById('file-sum-list');
    if(list){
      const item=document.createElement('div');item.className='sr';
      item.innerHTML=`<span class="sl">${{photo:'📷',video:'🎬',pdf:'📄',document:'📁'}[type]||'📁'}</span><span class="sv">${file.name}</span>`;
      list.appendChild(item);
    }
    // Update create button label
    const btn=document.getElementById('cbtn');
    if(btn)btn.innerHTML=`<i class="bi bi-check-lg me-1"></i>Create Property + Upload ${fileQueue.length} File${fileQueue.length>1?'s':''}`;
  });
  input.value='';
};

/* ═══ Submit ══════════════════════════════════════════════════════════════ */
async function doCreate(btn, row) {
  btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Creating…';
  clearSugs();
  // Collect note
  if(row){const n=row.querySelector('#qnote');if(n&&n.value.trim())A.quick_note=n.value.trim();}
  try {
    const r=await fetch(CREATE_URL,{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},body:JSON.stringify(A)});
    const d=await r.json();
    if(!d.redirect)throw new Error(d.error||'error');
    if(fileQueue.length){
      btn.innerHTML=`<span class="spinner-border spinner-border-sm me-1"></span>Uploading ${fileQueue.length} file(s)…`;
      const {ok,fail}=await uploadFiles(d.slug);
      await botSay(`✅ Property created and ${ok} file(s) uploaded${fail?' ('+fail+' failed)':''}!`,240);
    } else {
      await botSay('✅ Property created!',240);
    }
    // Show navigation options instead of auto-redirecting
    sugs.innerHTML='';
    const mapA=document.createElement('a');
    let mapHref='/properties/';
    if(d.latitude && d.longitude) mapHref=`/properties/?lat=${d.latitude}&lng=${d.longitude}`;
    mapA.href=mapHref; mapA.className='sc'; mapA.textContent='← Back to Map';
    mapA.style.cssText='text-decoration:none;';
    const propA=document.createElement('a');
    propA.href=d.redirect; propA.className='sc'; propA.textContent='Open Property →';
    propA.style.cssText='text-decoration:none;border-color:#198754;color:#198754;';
    sugs.appendChild(mapA); sugs.appendChild(propA);
  } catch {
    await botSay('❌ Something went wrong — please try again.',200);
    btn.disabled=false; btn.innerHTML='<i class="bi bi-check-lg me-1"></i>Create Property';
  }
}

async function uploadFiles(slug){
  let ok=0,fail=0;
  for(const f of fileQueue){
    try{
      const fd=new FormData();fd.append('file',f.file);fd.append('file_type',f.type);fd.append('description','');
      const r=await fetch(`${UPLOAD_BASE}${slug}/attachments/upload/`,{method:'POST',headers:{'X-CSRFToken':CSRF},body:fd});
      r.ok?ok++:fail++;
    }catch{fail++;}
  }
  return{ok,fail};
}

start();
})();
</script>

{% if GOOGLE_MAPS_API_KEY %}
<script>
window.geocoder = null;
function initChatGeocoder() {
    window.geocoder = new google.maps.Geocoder();
}
function geocodeText(address) {
    return new Promise(function(resolve) {
        if (!window.geocoder) { resolve(null); return; }
        window.geocoder.geocode({ address: address, region: 'in' }, function(results, status) {
            if (status === 'OK' && results.length > 0) {
                var loc = results[0].geometry.location;
                resolve({ lat: loc.lat(), lng: loc.lng(), formattedAddress: results[0].formatted_address });
            } else {
                resolve(null);
            }
        });
    });
}
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&callback=initChatGeocoder"></script>
{% endif %}
