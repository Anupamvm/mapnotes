<div class="mb-3">
    <h6 class="fw-semibold">Add Note</h6>
    <form hx-post="{% url 'properties:note-add' property.slug %}"
          hx-target="#note-section"
          hx-swap="innerHTML">
        {% csrf_token %}
        <div class="row g-2 mb-2">
            <div class="col-12 col-sm-8">
                <input type="text" name="quick_note" class="form-control form-control-sm"
                       placeholder="Quick note..." required maxlength="500">
            </div>
            <div class="col-12 col-sm-3">
                <select name="category" class="form-select form-select-sm">
                    <option value="personal">Personal</option>
                    <option value="water">Water</option>
                    <option value="legal">Legal</option>
                    <option value="access">Access</option>
                    <option value="price">Price</option>
                    <option value="agent">Agent</option>
                    <option value="farming">Farming</option>
                    <option value="tourism">Tourism</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="col-12 col-sm-1">
                <button type="submit" class="btn btn-success btn-sm w-100">
                    <i class="bi bi-plus"></i>
                </button>
            </div>
        </div>
        <div id="quill-note" style="height:100px; background:white;"></div>
        <input type="hidden" name="detailed_note" id="detailed_note_input">
    </form>
</div>

{% if notes %}
<div>
    {% for note in notes %}
    <div class="card mb-2">
        <div class="card-body py-2">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <span class="badge bg-secondary small me-1">{{ note.get_category_display }}</span>
                    <span class="small fw-semibold">{{ note.quick_note }}</span>
                </div>
                <button class="btn btn-outline-danger btn-sm py-0"
                        hx-post="{% url 'properties:note-delete' property.slug note.pk %}"
                        hx-target="#note-section"
                        hx-swap="innerHTML"
                        hx-confirm="Delete this note?">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
            {% if note.detailed_note %}
            <div class="small text-muted mt-1 quill-content">{{ note.detailed_note|safe }}</div>
            {% endif %}
            <div class="x-small text-muted mt-1">{{ note.created_at|date:"M d, Y H:i" }}</div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-muted small">No notes yet.</p>
{% endif %}

<script>
// Initialize Quill on note form
if (typeof Quill !== 'undefined') {
    const quill = new Quill('#quill-note', {
        theme: 'snow',
        placeholder: 'Detailed notes (optional)...',
        modules: { toolbar: [['bold','italic','underline'],['blockquote'],['clean']] }
    });
    document.querySelector('[hx-target="#note-section"]').addEventListener('htmx:configRequest', function(e) {
        document.getElementById('detailed_note_input').value = quill.root.innerHTML;
    });
}
</script>
