{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
.three-panel-layout {
    display: grid;
    grid-template-columns: 260px 1fr 380px;
    height: calc(100vh - 56px);
    overflow: hidden;
}
.three-panel-layout .panel-left {
    overflow-y: auto;
    border-right: 1px solid var(--bs-border-color);
    padding: 1rem;
}
.three-panel-layout .panel-center {
    overflow: hidden;
    position: relative;
}
.three-panel-layout .panel-right {
    overflow-y: auto;
    border-left: 1px solid var(--bs-border-color);
}
#map-container {
    width: 100%;
    height: 100%;
}

/* Mobile: single column */
@media (max-width: 991px) {
    .three-panel-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        height: auto;
        overflow: visible;
    }
    .three-panel-layout .panel-left {
        border-right: none;
        border-bottom: 1px solid var(--bs-border-color);
        max-height: 300px;
    }
    .three-panel-layout .panel-center {
        height: 50vh;
    }
    .three-panel-layout .panel-right {
        border-left: none;
        border-top: 1px solid var(--bs-border-color);
        max-height: 60vh;
        overflow-y: auto;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="three-panel-layout">
    <!-- Left: Filters -->
    <div class="panel-left d-none d-lg-block" id="filter-panel">
        {% block panel_left %}{% endblock %}
    </div>

    <!-- Center: Map -->
    <div class="panel-center">
        {% block panel_center %}
        <div id="map-container"></div>
        {% endblock %}
    </div>

    <!-- Right: Property List / Detail -->
    <div class="panel-right" id="right-panel">
        {% block panel_right %}{% endblock %}
    </div>
</div>
{% endblock %}
