{% extends 'base.html' %}
{% block title %}Password Changed — MapNotes{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:480px;">
    <div class="card shadow-sm text-center">
        <div class="card-body p-5">
            <i class="bi bi-check-circle-fill text-success" style="font-size:2.5rem;"></i>
            <h5 class="fw-bold mt-3 mb-2">Password Updated</h5>
            <p class="text-muted small mb-4">Your password has been changed successfully.</p>
            <a href="{% url 'core:account-settings' %}" class="btn btn-success">
                <i class="bi bi-arrow-left me-1"></i>Back to Account Settings
            </a>
        </div>
    </div>
</div>
{% endblock %}
