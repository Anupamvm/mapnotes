version: '3.9'

services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn mapnotes.wsgi:application --bind 0.0.0.0:8002 --workers 3 --reload --timeout 120"
    volumes:
      - .:/app
      - media_data:/app/media
      - sqlite_data:/app/db
    ports:
      - "8002:8002"
    env_file:
      - .env

volumes:
  media_data:
  sqlite_data:
